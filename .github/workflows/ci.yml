name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make libpulse-dev libasound2-dev upx-ucl \
            gcc-mingw-w64-x86-64 \
            python3 python3-numpy

      - name: Build Linux synth
        run: make

      - name: Bit-exact regression test
        run: make test

      - name: Bridge regression test (Constitution<->Makefile)
        # Standalone invocation of tests/test_spec_budget_check.sh
        # (the 5-case / 9-sub-check regression suite for
        # tools/spec-budget-check.sh introduced by PR #122 /
        # 025-spec-to-make-bridge). Mirrors the `make test`
        # wiring but surfaces the bridge check as a distinct CI
        # step for clearer pass/fail attribution. Catches
        # regressions in the script's extraction regex /
        # arithmetic / validation logic -- the kind that
        # motivated the post-#117 spec<->build drift cleanup
        # cascade (PRs #118-#124). Cheap (~5 s of in-memory
        # file tamper + restore cycles); no build artefacts
        # required since the bridge is pure Constitution<->Makefile
        # static alignment.
        # Also serves as the pre-flight for the `Binary size budget
        # gate` step downstream: case 1 (happy-path) calls
        # `tools/spec-budget-check.sh` against the current main, so
        # a Constitution<->Makefile drift fails case 1 first, before
        # the gate ever fires.
        run: bash tests/test_spec_budget_check.sh

      - name: Unit tests
        run: make test-unit

      - name: Multi-seed integration test
        run: make test-multiseed

      - name: Live-mode smoke test (skips if no PA)
        run: make test-smoke

      - name: Cross-compile Windows .exe
        run: make win

      - name: UPX-pack Windows .exe
        run: make winpack

      - name: Binary sizes report
        # Capture all 4 byte counts (Linux synth stripped, Linux
        # synth.packed, Windows stretto.exe stripped, Windows
        # stretto.packed.exe) via `make size`. CI's full toolchain
        # populates all 4 rows; local dev hosts get a partial report
        # (Makefile skips UPX/mingw rows whose toolchain is missing).
        # Report is uploaded so PR-time refreshes of ARCHITECTURE.md
        # binary-size row can be sourced from CI artifact instead of
        # needing local toolchain reinstallation.
        run: make size | tee binary-sizes.txt

      - name: Upload binary sizes artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-sizes
          path: binary-sizes.txt

      - name: Binary size budget gate
        # Replaces the prior Windows-only `Windows packed binary size
        # budget` step (which used `stat -c%s stretto.packed.exe`
        # directly with a hardcoded `budget=49152` and silently passed
        # on Linux drifts since it didn't check the 2 Linux keys).
        # The new 3-key gate parses the `binary-sizes.txt` artifact
        # dropped by the upstream `Binary sizes report` step (PR #115)
        # so all 3 Constitution Principle I binary budgets are
        # enforced against a single source-of-truth. A future drift to
        # any of the 3 budgets fails the CI run immediately rather
        # than hiding behind a `WARNING:` line from `make size`.
        #
        # Budget constants mirror Makefile (drift source-of-truth):
        #   STRIP_TARGET    = 51200  bytes (~50 KB) -- Linux synth stripped   (Constitution v1.1.0; PR #116)
        #   PACK_TARGET     = 30720  bytes (~30 KB) -- Linux synth UPX-packed (Constitution v1.2.0; PR #121)
        #   WIN_PACK_BUDGET = 49152  bytes (~48 KB) -- Windows UPX-packed     (Constitution v1.1.0)
        # If Makefile values change, update these in lockstep.
        # Note: the upstream `Bridge regression test
        # (Constitution<->Makefile)` step (case 1) catches
        # Makefile<->Constitution drift via
        # tools/spec-budget-check.sh BEFORE this gate fires. If you
        # bump Makefile WITHOUT bumping these inline constants, the
        # bridge catches the drift at PR-merge time, but the gate
        # will pin the old value at the measurement-enforcement step
        # until these constants are bumped too. Always bump both.
        run: |
          set -e
          awk -F= '
            $1 == "linux_synth_stripped"        { stripped = $2 }
            $1 == "linux_synth_packed"          { packed = $2 }
            $1 == "windows_stretto_exe_packed"  { win_packed = $2 }
            END {
              STRIP_BUDGET    = 51200
              PACK_BUDGET     = 30720
              WIN_PACK_BUDGET = 49152
              fail = 0

              if (stripped == "") {
                print "  linux_synth_stripped: MISSING key in binary-sizes.txt -- Constitution v1.1.0 enforcement required"
                fail = 1
              } else if (stripped == "missing") {
                print "  linux_synth_stripped: not built locally (toolchain row missing per Makefile size target) -- skipped"
              } else if (stripped + 0 > STRIP_BUDGET) {
                printf("FAIL: linux_synth_stripped=%s > STRIP_BUDGET=%d -- Constitution v1.1.0 (Principle I Linux stripped cap)\n", stripped, STRIP_BUDGET)
                print "      Amend Principle I in .specify/memory/constitution.md, OR amend STRIP_TARGET in Makefile, OR trim the trigger feature."
                fail = 1
              } else {
                printf("  linux_synth_stripped=%s bytes  ok (<= %d budget, Constitution v1.1.0)\n", stripped, STRIP_BUDGET)
              }

              if (packed == "") {
                print "  linux_synth_packed: MISSING key in binary-sizes.txt -- Constitution v1.2.0 enforcement required"
                fail = 1
              } else if (packed == "missing") {
                print "  linux_synth_packed: not built locally (UPX unavailable) -- skipped"
              } else if (packed + 0 > PACK_BUDGET) {
                printf("FAIL: linux_synth_packed=%s > PACK_BUDGET=%d -- Constitution v1.2.0 (Principle I Linux UPX cap)\n", packed, PACK_BUDGET)
                print "      Amend Principle I in .specify/memory/constitution.md, OR amend PACK_TARGET in Makefile, OR trim the trigger feature."
                fail = 1
              } else {
                printf("  linux_synth_packed=%s bytes  ok (<= %d budget, Constitution v1.2.0)\n", packed, PACK_BUDGET)
              }

              if (win_packed == "") {
                print "  windows_stretto_exe_packed: MISSING key in binary-sizes.txt -- Constitution v1.1.0 enforcement required"
                fail = 1
              } else if (win_packed == "missing") {
                print "  windows_stretto_exe_packed: not built locally (mingw unavailable) -- skipped"
              } else if (win_packed + 0 > WIN_PACK_BUDGET) {
                printf("FAIL: windows_stretto_exe_packed=%s > WIN_PACK_BUDGET=%d -- Constitution v1.1.0 (Principle I Windows UPX cap)\n", win_packed, WIN_PACK_BUDGET)
                print "      Amend Principle I in .specify/memory/constitution.md, OR amend WIN_PACK_BUDGET in this step, OR trim the trigger feature."
                fail = 1
              } else {
                printf("  windows_stretto_exe_packed=%s bytes  ok (<= %d budget, Constitution v1.1.0)\n", win_packed, WIN_PACK_BUDGET)
              }

              if (fail > 0) {
                print "Binary size budget gate FAILED. See .specify/memory/constitution.md Principle I for principled defense of any future budget changes."
              } else {
                print "Binary size budget gate PASSED."
              }
              exit fail
            }
          ' binary-sizes.txt

      - name: Coverage report
        run: |
          make coverage 2>&1 | tee coverage.log

      - name: Coverage gates
        # Per-file gates against the measured subset (interactive
        # modules ui.c, keys.c, audio_pulse.c are excluded by
        # COV_SRCS_INTERACTIVE in Makefile - they need a TTY + audio
        # device that CI does not have). Tightening these forces
        # the project's coverage discipline to ratchet up over time.
        run: |
          declare -A thresholds=(
            [audio_midi.c]=90
            [arena.c]=95
            [effects.c]=95
            [voice.c]=95
            [gen.c]=90
            [lsystem.c]=90
            [chord_progression.c]=90
            [section.c]=95
            [density.c]=95
            [motif.c]=95
            [mixer.c]=95
            [wav.c]=90
          )
          fail=0
          for f in "${!thresholds[@]}"; do
            # gcov occasionally reports a file twice (e.g. main.c gets
            # one entry per .gcno representation). Pick the entry with
            # the most lines — the more comprehensive view of the file.
            pct=$(grep -E "^${f}:" coverage.log | sort -k4 -n | tail -1 | \
                  awk '{print $2}' | tr -d '%' | awk -F. '{print $1}')
            need=${thresholds[$f]}
            if [ -z "$pct" ]; then
              echo "  $f: no coverage data (need >=${need}%)  FAIL"
              fail=1
            elif [ "$pct" -lt "$need" ]; then
              echo "  $f: $pct%  FAIL (need >=${need}%)"
              fail=1
            else
              echo "  $f: $pct%  ok (need >=${need}%)"
            fi
          done
          exit $fail

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stretto-windows
          path: stretto.packed.exe

      - name: Upload coverage log
        uses: actions/upload-artifact@v4
        with:
          name: coverage-log
          path: coverage.log
