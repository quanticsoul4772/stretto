# CI step numbering: GitHub Actions auto-prepends `Set up job` to every
# job, so UI step numbers are 1-indexed from the auto-added step. The
# explicit `actions/checkout@v4` step is step #2 in the UI (not #1).
# Use UI numbers in PR bodies / commit messages; the YAML order is
# 0-indexed from `actions/checkout@v4` and internal to this file.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Explicit least-privilege token (pre-publication hardening): this
# workflow only builds and tests - it never writes to the repo. The
# repo-level default is already read-only, but stating it here
# survives any future settings change and is the posture fork PRs
# should see on a public repo. release.yml declares its own
# contents: write.
permissions:
  contents: read

jobs:
  # ASan + UBSan over the unit suite + a render regression (separate
  # object tree via `make test-asan`; UB is FATAL via
  # -fno-sanitize-recover, since UBSan's default report-and-continue
  # exits 0). Runs in parallel with the main job. NOTE: REQUIRED by
  # the main-protection ruleset (id 18729764) BY THE RENDERED JOB
  # NAME `sanitizers`, same coupling as `build-test-coverage` below
  # (075). Renaming this job or adding a `name:` key orphans the
  # required context and blocks every merge with "Expected - waiting
  # for status"; update the ruleset in the same change.
  sanitizers:
    runs-on: ubuntu-24.04
    # A sanitizer-slowed hang must not burn the 360-minute default;
    # the whole job finishes in ~2-4 minutes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make pkg-config libpulse-dev libasound2-dev
      - name: Sanitized tests (ASan + UBSan fatal)
        run: make test-asan

  build-test-coverage:
    # Pinned (not -latest) and kept IDENTICAL to release.yml's runner:
    # the lookup tables are generated at build time with host libm
    # (sinf/exp in gen_*_table.c), so a glibc bump can flip a table
    # entry and change every render hash. Releases must run on the
    # exact image CI gates the goldens on. Bump both files together.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` (version.h / --version)
          # yields a resolvable "1.2.0-final-N-g<hash>" instead of the
          # bare hash of the ephemeral PR merge ref. Repo is tiny; the
          # extra fetch cost is negligible.
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make libpulse-dev libasound2-dev upx-ucl \
            gcc-mingw-w64-x86-64 \
            python3 python3-numpy

      - name: Build Linux synth
        run: make

      - name: Bit-exact regression test
        run: make test

      - name: Bridge regression test (Constitution<->Makefile)
        # Standalone invocation of tests/test_spec_budget_check.sh
        # (the 5-case / 9-sub-check regression suite for
        # tools/spec-budget-check.sh introduced by PR #122 /
        # 025-spec-to-make-bridge). Mirrors the `make test`
        # wiring but surfaces the bridge check as a distinct CI
        # step for clearer pass/fail attribution. Catches
        # regressions in the script's extraction regex /
        # arithmetic / validation logic -- the kind that
        # motivated the post-#117 spec<->build drift cleanup
        # cascade (PRs #118-#124). Cheap (~5 s of in-memory
        # file tamper + restore cycles); no build artefacts
        # required since the bridge is pure Constitution<->Makefile
        # static alignment.
        # Also serves as the pre-flight for the `Binary size budget
        # gate` step downstream: case 1 (happy-path) calls
        # `tools/spec-budget-check.sh` against the current main, so
        # a Constitution<->Makefile drift fails case 1 first, before
        # the gate ever fires.
        run: bash tests/test_spec_budget_check.sh

      - name: Amend helper regression test (Constitution<->Makefile)
        # Standalone invocation of tests/test_spec_budget_amend.sh
        # (the 6-scenario / 21-sub-check regression suite for
        # tools/spec-budget-amend.sh introduced by PR #127 /
        # 032-spec-budget-amend). Mirrors the `make test` wiring
        # but surfaces the amend check as a distinct CI step for
        # clearer pass/fail attribution. Catches regressions in
        # the amend script's CLI parsing / KB validation / sed-based
        # Constitution + Makefile updates / rollback trap / refuse-to-
        # commit semantics -- the kind of regressions that could
        # silently break the v1.3.0+ amendment workflow. Cheap
        # (~5-10 s of in-memory file tamper + restore cycles);
        # no build artefacts required since the amend helper is
        # pure Constitution<->Makefile static mutation.
        run: bash tests/test_spec_budget_amend.sh

      - name: Size budget gate regression test
        # Fixture suite for tools/size-budget-gate.sh (066): synthetic
        # binary-sizes.txt files exercise the PASS / FAIL / skipped /
        # missing-key / missing-file / ADVISORY paths without any
        # build. Mirrors the `make test` wiring as a distinct CI step,
        # same pattern as the two spec-budget suites above.
        run: bash tests/test_size_budget_gate.sh

      - name: Unit tests
        run: make test-unit

      - name: Multi-seed integration test
        run: make test-multiseed

      - name: Live-mode smoke test (skips if no PA)
        run: make test-smoke

      - name: Cross-compile Windows .exe
        run: make win

      - name: UPX-pack Windows .exe
        run: make winpack

      - name: Binary sizes report
        # Capture all 4 byte counts (Linux synth stripped, Linux
        # synth.packed, Windows stretto.exe stripped, Windows
        # stretto.packed.exe) via `make size`. CI's full toolchain
        # populates all 4 rows; local dev hosts get a partial report
        # (Makefile skips UPX/mingw rows whose toolchain is missing).
        # Report is uploaded so PR-time refreshes of ARCHITECTURE.md
        # binary-size row can be sourced from CI artifact instead of
        # needing local toolchain reinstallation.
        # pipefail: without it the step's status is tee's (always 0)
        # and a failing `make size` would go green.
        run: |
          set -o pipefail
          make size | tee binary-sizes.txt

      - name: Upload binary sizes artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-sizes
          path: binary-sizes.txt

      - name: Binary size budget gate
        # Replaces the prior Windows-only `Windows packed binary size
        # budget` step (which used `stat -c%s stretto.packed.exe`
        # directly with a hardcoded `budget=49152` and silently passed
        # on Linux drifts since it didn't check the 2 Linux keys).
        # The new 3-key gate parses the `binary-sizes.txt` artifact
        # dropped by the upstream `Binary sizes report` step (PR #115)
        # so all 3 Constitution Principle I binary budgets are
        # enforced against a single source-of-truth. A future drift to
        # any of the 3 budgets fails the CI run immediately rather
        # than hiding behind a `WARNING:` line from `make size`.
        #
        # Budgets are NOT hardcoded here: `make size` echoes the three
        # Makefile variables (STRIP_TARGET / PACK_TARGET /
        # WIN_PACK_BUDGET) into binary-sizes.txt as budget_* key=value
        # rows, and the gate reads measurements AND budgets from that
        # one artifact. The Makefile is the measurement-side source of
        # truth; the upstream `Bridge regression test
        # (Constitution<->Makefile)` step ties the Makefile values to
        # Constitution Principle I BEFORE this gate fires, so a
        # Principle I amendment only ever needs to touch the
        # Constitution + Makefile pair (tools/spec-budget-amend.sh).
        #
        # The gate body lives in tools/size-budget-gate.sh (extracted
        # from the former inline awk) so release.yml enforces the
        # IDENTICAL gate on the binaries it publishes.
        run: bash tools/size-budget-gate.sh binary-sizes.txt

      - name: Coverage report
        # pipefail: same reason as the size step - tee must not mask
        # a coverage build/run failure.
        run: |
          set -o pipefail
          make coverage 2>&1 | tee coverage.log

      - name: Coverage gates
        # Per-file gates against the measured subset (interactive
        # modules audio_pulse.c, audio_midi_linux.c are excluded by
        # COV_SRCS_INTERACTIVE in the Makefile - they need a live
        # audio server / ALSA sequencer that CI does not provide.
        # Graduations: main.c in 080 (fork harness over stretto_main),
        # ui.c + keys.c in 081 (fork-driven draw/write/degrade/signal
        # tests; keys.c was already 100% via test_keys).
        # Tightening these forces the project's coverage discipline
        # to ratchet up over time.
        run: |
          # lsystem.c / chord_progression.c gates sit at their proven
          # ceilings: the only uncovered lines are defensive guards
          # that unit tests pin as unreachable (lsystem mutation can
          # only write SYM_UP..SYM_REST, so the unknown-symbol guards
          # never fire; every Markov row has a positive sum, so the
          # degenerate-row guard never fires). 95 is not reachable
          # without deleting that defense-in-depth.
          # main.c gates at its proven ceiling (064 ratchet): 99.33%
          # measured identically on CI and local - the single
          # uncovered line is the env-symmetric list-devices branch
          # (print-loop body vs zero-device notice; exactly one is
          # unreachable per environment). Driven by the 080 fork
          # harness over stretto_main (main_testable.gcno).
          # ui.c gates at its fork-reachable ceiling (081): 92.88%
          # identical on CI and local. The ~26 uncovered lines are
          # the TTY-only termios bodies (raw-mode entry, restore/
          # replay) + die_sys - reaching them needs a real PTY
          # (posix_openpt could add ~5% but couples the gate to
          # /dev/ptmx; deliberate non-goal). keys.c is fully driven
          # by test_keys/test_resume.
          declare -A thresholds=(
            [ui.c]=92
            [keys.c]=100
            [main.c]=99
            [audio_midi.c]=90
            [arena.c]=95
            [effects.c]=95
            [voice.c]=95
            [gen.c]=90
            [lsystem.c]=94
            [chord_progression.c]=92
            [section.c]=95
            [density.c]=95
            [motif.c]=95
            [mixer.c]=95
            [wav.c]=90
          )
          fail=0
          for f in "${!thresholds[@]}"; do
            # gcov occasionally reports a file twice (e.g. main.c gets
            # one entry per .gcno representation). Pick the entry with
            # the most lines — the more comprehensive view of the file.
            pct=$(grep -E "^${f}:" coverage.log | sort -k4 -n | tail -1 | \
                  awk '{print $2}' | tr -d '%' | awk -F. '{print $1}')
            need=${thresholds[$f]}
            if [ -z "$pct" ]; then
              echo "  $f: no coverage data (need >=${need}%)  FAIL"
              fail=1
            elif [ "$pct" -lt "$need" ]; then
              echo "  $f: $pct%  FAIL (need >=${need}%)"
              fail=1
            else
              echo "  $f: $pct%  ok (need >=${need}%)"
            fi
          done
          exit $fail

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: stretto-windows
          path: stretto.packed.exe

      - name: Upload coverage log
        uses: actions/upload-artifact@v4
        with:
          name: coverage-log
          path: coverage.log
