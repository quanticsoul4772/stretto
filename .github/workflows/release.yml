# Release workflow: tag-triggered build + gate + publish.
#
# Runner is PINNED to the same image as ci.yml (build-time table
# generators use host libm - sinf/exp in gen_*_table.c - so a glibc
# bump can flip a table entry and change every render hash; releases
# must run on the exact image CI gates the goldens on; bump both
# files together).
#
# workflow_dispatch exists so the whole pipeline (deps, gates, builds,
# assertions, assembly) can be rehearsed on main before a tag is
# pushed; the publish steps are guarded on ref_type == 'tag' and skip
# cleanly in a rehearsal.
#
# TAG is passed via step-level env and only ever used quoted - never
# ${{ }}-inlined into run: scripts (refnames may contain shell
# metacharacters; interpolation happens before the shell parses).
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags: version.h derives from `git describe`.
          fetch-depth: 0

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make libpulse-dev libasound2-dev upx-ucl \
            gcc-mingw-w64-x86-64 \
            python3 python3-numpy

      - name: Build
        run: make

      - name: Release gates (bit-exact + CLI + budget suites)
        run: make test

      - name: Release gates (unit)
        run: make test-unit

      - name: Release gates (multi-seed)
        # The check most likely to LOCALIZE a libm-drift hash change
        # across seeds, should the runner image ever shift under us.
        run: make test-multiseed

      - name: Version assertion (tag builds only)
        if: github.ref_type == 'tag'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          want="stretto ${TAG#v}"
          got="$(./synth --version | head -1)"
          echo "want: $want"
          echo "got:  $got"
          test "$got" = "$want"

      - name: Pack + cross-compile
        run: |
          make pack
          make win
          make winpack

      - name: Size budget gate
        # pipefail so a failing `make size` cannot hide behind tee's 0.
        run: |
          set -o pipefail
          make size | tee binary-sizes.txt
          bash tools/size-budget-gate.sh binary-sizes.txt

      - name: Post-build assertions
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # No -dirty may have leaked into any later build: no TRACKED
          # file may be modified after all builds and gates.
          # --untracked-files=no matches `git describe --dirty`'s
          # semantics exactly - untracked build artifacts (e.g.
          # binary-sizes.txt, also gitignored now) are not dirt.
          # (First rehearsal run 29028879971 failed here on exactly
          # that false positive.)
          test -z "$(git status --porcelain --untracked-files=no)" || \
            { git status --porcelain --untracked-files=no; exit 1; }
          # The version literal must be embedded in the (unpacked)
          # Windows exe too - it was linked by a later make invocation
          # than the asserted ./synth.
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            grep -aq "stretto ${TAG#v}" stretto.exe
          fi

      - name: Assemble dist
        env:
          TAG: ${{ github.ref_name }}
        run: |
          ver="$TAG"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || ver="rehearsal-$(git describe --tags --always)"
          mkdir -p dist
          cp synth              "dist/stretto-${ver}-linux-x86_64"
          cp synth.packed       "dist/stretto-${ver}-linux-x86_64-upx"
          cp stretto.exe        "dist/stretto-${ver}-windows-x86_64.exe"
          cp stretto.packed.exe "dist/stretto-${ver}-windows-x86_64-upx.exe"
          cp stretto.1          dist/stretto.1
          # Shell completions + the demo WAV (068). UNVERSIONED names
          # (like stretto.1) so releases/latest/download/ URLs stay
          # stable, and shaped so the installer's bin_name anchor
          # (^stretto-.*-linux-x86_64$) can never match them. The demo
          # is the exact canonical "hear it now" render from README /
          # install.sh; rendered fresh per release - a committed
          # golden hash would be runner-image-fragile (libm tables).
          cp completions/stretto.bash dist/stretto.bash
          cp completions/_stretto     dist/_stretto
          ./synth --render 10 dist/stretto-demo.wav --seed 42
          test -s dist/stretto-demo.wav
          cd dist && sha256sum * > sha256sums.txt && cat sha256sums.txt

      - name: Installer drift gate
        # Runs install.sh against the exact assembled dist (file://
        # base) on BOTH tag and rehearsal builds: the script's
        # asset-name construction is a contract with the Assemble step
        # above, and renaming an asset must fail HERE, not on users'
        # machines. Ends with a --version execution check on the
        # installed real binary - strictly stronger than the offline
        # fake-dist tests in tests/test_cli.sh (install.sh itself never
        # executes what it installs).
        run: |
          idest=$(mktemp -d)
          STRETTO_BASE_URL="file://$PWD/dist" STRETTO_INSTALL_DIR="$idest" sh install.sh
          "$idest/stretto" --version | head -1
          test -f "$idest/stretto.1"
          # Completions present in this dist -> the installer must
          # have fetched, verified, and installed them (flat mode
          # keeps the asset names).
          test -f "$idest/stretto.bash"
          test -f "$idest/_stretto"

      - name: Upload rehearsal artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: release-rehearsal
          path: dist/

      - name: Publish release (idempotent)
        if: github.ref_type == 'tag'
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "stretto ${TAG#v} - deterministic generative music synthesizer."
            echo
            echo "**Windows users: download the unpacked \`.exe\`.** The \`-upx\` binaries"
            echo "exist for the size-budget tradition and are routinely false-positived"
            echo "by antivirus software."
            echo
            echo "\`stretto-demo.wav\` is a 10 s render at \`--seed 42\` - exactly what"
            echo "\`stretto --render 10 demo.wav --seed 42\` produces. \`stretto.bash\` /"
            echo "\`_stretto\` are shell completions (install.sh installs them for you)."
            echo
            echo '## sha256sums'
            echo '```'
            cat dist/sha256sums.txt
            echo '```'
            echo
            echo "GitHub's auto-generated source tarballs are NOT covered by"
            echo "sha256sums.txt and are not byte-stable long-term; build from the"
            echo "tag or use the binaries above."
          } > /tmp/release-notes.md
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --verify-tag --draft \
              --title "stretto ${TAG#v}" --notes-file /tmp/release-notes.md
          gh release upload "$TAG" dist/* --clobber
          gh release edit "$TAG" --draft=false
